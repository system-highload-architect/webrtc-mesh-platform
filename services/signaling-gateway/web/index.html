<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🏛️ WebRTC Mesh Platform Console</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h2>🏛️ WebRTC P2P Mesh Real-Time Control Workspace</h2>
    <div style="margin-bottom: 15px; background: #21262d; padding: 10px; border-radius: 4px;">
        <span id="role-badge" style="color: #ecc94b; font-weight: bold;">[СТАТУС] Инициализация сессии...</span>
        <span style="margin-left: 20px;">Комната: <b id="room-lbl">-</b> | Ваш ID: <b id="peer-lbl">-</b></span>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>📹 Direct Media Tunnels (Full-Mesh)</h3>
            <div id="video-workspace">
                <div class="video-box" id="local-video-box"><span class="badge" style="color:#319795;">📱 LOCAL CAPTURE</span><div id="local-status">Камера активна</div></div>
                <div class="video-box" id="remote-video-box" style="display:none;"><span class="badge" style="color:#4299e1;">💻 PEER STREAM</span><div>Поток активен</div></div>
            </div>
            <div style="margin-top:15px; display:flex; gap:10px;" id="moderator-controls">
                <button class="btn btn-mod" id="mute-btn">🎙️ Заглушить (Mute)</button>
                <button class="btn btn-mod" id="kick-btn">❌ Выгнать (Kick)</button>
                <button class="btn btn-mod" style="border-color:#ecc94b; color:#ecc94b;" id="pause-btn">⏸️ Перерыв (Pause)</button>
            </div>
        </div>

        <div class="panel">
            <h3>💬 Smart AppSec Chat (Trie-T9 Protected)</h3>
            <div class="chat-area" id="chat-box"></div>
            <div class="input-group">
                <span class="t9-hint" id="t9-placeholder"></span>
                <input type="text" id="chat-input" placeholder="Введите сообщение (TAB для Т9)..." autocomplete="off">
            </div>
        </div>
    </div>

    <!-- Нативное склеивание изолированных JS интерфейсов через ESM-модули -->
    <script type="module">
        import { checkT9, handleTabCompletion } from '/static/js/chat.js';

        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('room') || "demo_room";
        const peerID = urlParams.get('peer') || "user_rd";
        const isMod = urlParams.get('mod') === "true";

        document.getElementById('room-lbl').innerText = roomID;
        document.getElementById('peer-lbl').innerText = peerID;

        const inputEl = document.getElementById('chat-input');
        const placeholderEl = document.getElementById('t9-placeholder');
        let activeSuggestion = "";

        inputEl.oninput = async () => {
            activeSuggestion = await checkT9(inputEl, placeholderEl);
        };

        inputEl.onkeydown = (e) => {
            if (e.key === "Tab" && activeSuggestion) {
                e.preventDefault();
                handleTabCompletion(inputEl, placeholderEl, activeSuggestion);
                activeSuggestion = "";
            }
        };

        // Подключаем ВЕРСИОНИРОВАННЫЙ v1 WebSocket сигнального шлюза
        const ws = new WebSocket(`ws://${window.location.host}/api/v1/ws?room=${roomID}&peer=${peerID}&mod=${isMod}`);
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === "peer_joined") document.getElementById('remote-video-box').style.display = "flex";
        };
    </script>
</body>
</html>
