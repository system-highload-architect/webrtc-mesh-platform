{{define "content"}}
<div class="gateway-container">
    <h3 style="color: #4299e1; margin-top: 0; font-family: monospace; letter-spacing: 0.5px;">📱 Join Sandbox Gateway</h3>
    <p style="color: #8b949e; font-size: 13px; margin-bottom: 20px;">Инициализация WebRTC Mesh периметра. Настройте состояние устройств до старта сессии.</p>

    <!-- ЖИВОЕ ПРЕВЬЮ КАМЕРЫ НА СТАРТЕ (User Plane Preview API) -->
    <div class="preview-monitor">
        <span class="badge" style="color: #4299e1; z-index: 5;">📹 ПРЕДПРОСМОТР УСТРОЙСТВА</span>
        <video id="join-preview-stream" autoplay playsinline muted></video>
        <div style="position: absolute; bottom: 10px; color: #8b949e; font-size: 11px; z-index: 5;" id="preview-status">Запрос доступа к камере...</div>
    </div>

    <!-- РАЗДЕЛ 1: СВЯЗЫВАНИЕ ПАСПОРТА ЛИЧНОСТИ ЧЕРЕЗ NoSQL -->
    <div style="background: #07090d; padding: 16px; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 16px;">
        <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold;">Учетная запись сотрудника (Email):</label>
        <input type="text" id="employee-email" class="sandbox-input" value="konstantin@clearway.ru" style="width: 100%; margin-bottom: 12px;">
        
        <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold;">Пароль доступа к профилю:</label>
        <input type="password" id="employee-password" class="sandbox-input" value="user123" style="width: 100%;">
    </div>

    <!-- РАЗДЕЛ 2: НАСТРОЙКА КОДЕКОВ И УСТРОЙСТВ -->
    <div style="background: #07090d; padding: 16px; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 20px;">
        <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 8px; font-weight: bold;">Выбор начального качества видеопотока:</label>
        <select id="video-quality" style="font-weight: bold; background: #07090d; border: 1px solid #30363d; color: #c9d1d9; padding: 10px; width: 100%; border-radius: 4px; font-family: monospace;">
            <option value="1080p">Full HD (1080p, Wire-Speed, 4 Mbps)</option>
            <option value="720p" selected>HD Ready (720p, Balanced, 2 Mbps)</option>
            <option value="360p">Low Bandwidth (360p, GC Saving)</option>
        </select>

        <div style="display: flex; gap: 20px; margin-top: 16px; font-size: 12px;">
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="start-mic" checked style="width: auto; accent-color: #4299e1;"> 🎙️ Включить микрофон
            </label>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="start-video" checked style="width: auto; accent-color: #4299e1;"> 📹 Включить камеру
            </label>
        </div>
    </div>

    <button class="btn-sandbox btn-sandbox-active" id="join-btn-action" style="width: 100%; justify-content: center; padding: 12px; font-size: 13px; font-weight: bold;">
        🔐 Верифицировать токен и войти в контур
    </button>
</div>

<!-- Нативный импорт JS-рантайма страницы входа сотрудников -->
<script type="module">
    import { initJoinPage } from '/static/js/join.js?v={{.Version}}';
    
    // Аппаратный захват превью-видео при инициализации
    let activeStream = null;
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 360 }, audio: false })
    .then(stream => {
        activeStream = stream;
        const previewVideo = document.getElementById('join-preview-stream');
        if(previewVideo) previewVideo.srcObject = stream;
        const statusEl = document.getElementById('preview-status');
        if(statusEl) statusEl.innerText = "✅ Оборудование готово к b2b-трансляции";
    })
    .catch(err => {
        const statusEl = document.getElementById('preview-status');
        if(statusEl) statusEl.innerText = "⚠️ Камера отключена или занята процессом OS";
    });

    // Реактивное гашение камеры по тумблеру чекбокса
    const startVideoCb = document.getElementById('start-video');
    if (startVideoCb) {
        startVideoCb.onchange = (e) => {
            const previewVideo = document.getElementById('join-preview-stream');
            if(!e.target.checked && activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
                if(previewVideo) previewVideo.srcObject = null;
                const statusEl = document.getElementById('preview-status');
                if(statusEl) statusEl.innerText = "❌ Камера выключена пользователем";
            } else {
                window.location.reload();
            }
        };
    }

    // Запуск Use-Case логики
    initJoinPage();
</script>
{{end}}
