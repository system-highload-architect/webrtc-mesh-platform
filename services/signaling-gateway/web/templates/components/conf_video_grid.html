{{define "conf_video_grid"}}
<!-- Единый корневой Grid-контейнер платформы -->
<div id="video-grid" class="video-grid-layout" style="width: 100%; height: 100%; box-sizing: border-box;">
    
    <!-- Локальное окно Давида: по умолчанию инициализируется как главный Спикер сессии со стартовым фокусом -->
    <div class="video-wrapper active-speaker-focus" id="local-video-container" style="position: relative; background: #020617; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; box-sizing: border-box; border: 1px solid #1e293b;">
        
        {{if .IsModerator}}
        <!-- Золотая кнопка ручной фиксации фокуса на себе -->
        <div style="position: absolute; top: 8px; left: 8px; z-index: 50;">
            <button class="target-speaker-btn" data-peer="David_Moderator" style="background: rgba(15,23,42,0.85); border: 1px solid #ecc94b; color: #ecc94b; padding: 4px 8px; font-size: 10px; border-radius: 4px; cursor: pointer; font-family: monospace; font-weight: bold; transition: all 0.2s;">⭐ Спикер</button>
        </div>
        {{end}}

        <video id="local-video" autoplay muted playsinline style="width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); background: #020617; z-index: 1; opacity: 1; transition: opacity 0.2s;"></video>
        
        <span class="peer-name" id="local-name-label" style="position: absolute; bottom: 8px; left: 8px; background: rgba(0, 0, 0, 0.65); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-family: monospace; z-index: 10; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.05);">
            Я (Ведущий)
        </span>
    </div>

</div>
{{end}}
