{{define "moderator_panel"}}
<div id="moderator-control-dock" style="background: var(--bg-surface); border: 1px solid var(--border-slate); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 12px; font-family: monospace;">
    <div style="color: #ecc94b; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid var(--border-slate); padding-bottom: 8px; letter-spacing: 0.05em;">
        👑 СЕРВЕРНАЯ ПАНЕЛЬ ОРКЕСТРАЦИИ (ORGANIZER PLANE)
    </div>
    
    <!-- ИСПРАВЛЕНО (Кнопка Я Спикер ТЗ): Давид в 1 клик возвращает фокус конференции себе! -->
    <!-- FIXED: Added central master-focus button allowing organizer to reclaim screen space synchronously -->
    <button id="global-focus-me" class="btn-sandbox" style="width: 100%; background: #1e293b; border: 1px solid #ecc94b; color: #ecc94b; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; font-family: monospace; letter-spacing: 0.03em;">
        ⭐ Захватить фокус (Я спикер)
    </button>

    <div style="display: flex; gap: 8px; width: 100%;">
        <button id="global-mute-mic" class="btn-sandbox" style="flex: 1; background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; font-family: monospace;">
            🔇 Выкл всем звук
        </button>
        <button id="global-mute-cam" class="btn-sandbox" style="flex: 1; background: #1e293b; border: 1px solid #7f1d1d; color: #ef4444; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.7°rem; font-weight: bold; font-family: monospace;">
            ❌ Кикнуть гостей
        </button>
    </div>

    <button id="pause-btn" class="btn-sandbox" style="background: #7f1d1d; border: 1px solid #ef4444; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; font-family: monospace; text-transform: uppercase; letter-spacing: 0.05em;">
        ⏸️ Объявить перерыв (Пауза)
    </button>
</div>
