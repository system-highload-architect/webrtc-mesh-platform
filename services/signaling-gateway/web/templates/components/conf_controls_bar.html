{{define "conf_controls_bar"}}
<div class="controls-bar" id="infrastructure-controls" style="height: 70px; max-height: 70px; background-color: #0f172a; border-top: 1px solid #1e293b; padding: 0 16px; display: flex; align-items: center; justify-content: center; gap: 12px; z-index: 100; box-sizing: border-box; width: 100%;">
    <button class="ctrl-btn" id="audio-toggle" style="background-color: #1e293b; border: 1px solid #334155; color: white; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: monospace;">🎤 Микрофон: вкл</button>
    <button class="ctrl-btn" id="video-toggle" style="background-color: #1e293b; border: 1px solid #334155; color: white; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: monospace;">📷 Камера: вкл</button>
    <button class="ctrl-btn" id="screen-toggle" style="background-color: #1e293b; border: 1px solid #334155; color: white; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: monospace;">🖥️ Демонстрация</button>
    <button class="ctrl-btn btn-hangup" id="hangup-btn" style="background-color: #7f1d1d; border: 1px solid #ef4444; color: white; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: monospace; font-weight: 600;">🛑 Завершить</button>
</div>
{{end}}
