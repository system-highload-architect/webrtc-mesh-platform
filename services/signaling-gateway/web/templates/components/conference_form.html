{{define "conference_form"}}
    <!-- SOLID Композиция рабочей сессии созвона -->
    {{template "conf_header" .}}

    <div class="main-workspace" style="display: flex; flex-direction: row; height: calc(100vh - 150px); max-height: calc(100vh - 150px); width: 100%; overflow: hidden; box-sizing: border-box; gap: 16px;">
        
        <!-- Квадрант видеокамер -->
        {{template "conf_video_grid" .}}

        <!-- Боковой логгер чата -->
        <div class="chat-sidebar" id="chat-panel" style="width: 320px; background-color: #0f172a; border: 1px solid #1e293b; border-radius: 6px; display: flex; flex-direction: column; height: 100%; max-height: 100%; overflow: hidden; box-sizing: border-box;">
            <div class="chat-header" style="padding: 14px 16px; border-bottom: 1px solid #1e293b; color: #3b82f6; font-size: 0.85rem; font-weight: 600; font-family: monospace; display: flex; justify-content: space-between; width: 100%; box-sizing: border-box;">
                <span>⚡ room_chat_stream.log</span>
            </div>
            
            {{template "conf_chat_log" .}}
            {{template "conf_chat_input" .}}
        </div>
    </div>

    <!-- Пульт нижних кнопок управления -->
    {{template "conf_controls_bar" .}}
{{end}}
