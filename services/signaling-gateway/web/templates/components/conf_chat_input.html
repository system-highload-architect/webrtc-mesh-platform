{{define "conf_chat_input"}}
<div class="chat-input-area" style="padding: 12px; border-top: 1px solid #1e293b; display: flex; flex-direction: column; gap: 8px; background-color: #090d16; box-sizing: border-box; position: relative;">
    <!-- Слой Т9-подсказки префиксного дерева Trie -->
    <span id="t9-placeholder" style="position: absolute; left: 21px; top: 21px; color: #57606a; pointer-events: none; white-space: pre; font-size: 0.8rem; font-family: monospace; z-index: 5;"></span>
    
    <div style="display: flex; gap: 8px; width: 100%;">
        <input type="text" id="chat-input" placeholder="Написать в чат (TAB для Т9)..." class="chat-input" style="flex: 1; background: #020617; border: 1px solid #334155; border-radius: 4px; padding: 8px; color: white; font-size: 0.8rem; font-family: monospace; z-index: 2; position: relative;" maxlength="555" autocomplete="off">
        <button id="chat-send-btn" class="ctrl-btn" style="padding: 8px 14px; background-color: #2563eb; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 0.8rem; z-index: 2;">📤</button>
    </div>
</div>
{{end}}
