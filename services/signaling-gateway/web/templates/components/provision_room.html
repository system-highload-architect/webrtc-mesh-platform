{{define "provision_room"}}
<div id="setup-section" style="display: none; background: #07090d; padding: 16px; border: 1px solid #30363d; border-radius: 6px; flex-direction: column; gap: 12px;">
    <div>
        <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold; font-family: monospace;">Уникальный ID создаваемой комнаты:</label>
        <input type="text" id="room-id" value="clearway_pki_session" style="width: 100%; background: #020617; border: 1px solid #334155; padding: 8px; color: white; font-family: monospace; border-radius: 4px; box-sizing: border-box;" maxlength="50">
    </div>

    <!-- Ограничиваем ввод строго до 100 человек и до 300 минут (5 часов) прямо на уровне HTML5-атрибутов -->
    <!-- Bound maximum capabilities frame rules directly over the form component fields -->
    <div style="display: flex; gap: 12px; width: 100%; box-sizing: border-box;">
        <div style="flex: 1;">
            <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold; font-family: monospace;">Лимит участников (1-100):</label>
            <input type="number" id="max-peers" value="100" min="1" max="100" style="width: 100%; background: #020617; border: 1px solid #334155; padding: 8px; color: white; font-family: monospace; border-radius: 4px; box-sizing: border-box;">
        </div>
        <div style="flex: 1;">
            <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold; font-family: monospace;">Время сессии (минут, макс 300):</label>
            <input type="number" id="room-duration" value="30" min="5" max="300" style="width: 100%; background: #020617; border: 1px solid #334155; padding: 8px; color: white; font-family: monospace; border-radius: 4px; box-sizing: border-box;">
        </div>
    </div>
    
    <button id="provision-btn-action" style="width: 100%; background: #161b22; color: #319795; border: 1px solid #319795; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: monospace; font-size: 12px; transition: all 0.2s;">
        ⚡ Скомпилировать RAM-шард комнаты
    </button>
</div>
{{end}}
