{{define "provision_room"}}
<div id="setup-section" style="display: none; background: #07090d; padding: 16px; border: 1px solid #30363d; border-radius: 6px; flex-direction: column; gap: 12px;">
    <div>
        <label style="font-size: 11px; color: #8b949e; display: block; margin-bottom: 6px; font-weight: bold; font-family: monospace;">Уникальный ID создаваемой комнаты:</label>
        <input type="text" id="room-id" value="clearway_pki_session" style="width: 100%; background: #020617; border: 1px solid #334155; padding: 8px; color: white; font-family: monospace; border-radius: 4px; box-sizing: border-box;" maxlength="50">
    </div>
    
    <button id="provision-btn-action" style="width: 100%; background: #161b22; color: #319795; border: 1px solid #319795; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: monospace; font-size: 12px; transition: all 0.2s;">
        ⚡ Скомпилировать RAM-шард комнаты
    </button>
</div>
{{end}}
