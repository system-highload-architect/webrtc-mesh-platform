{{define "join_media"}}
<div class="sandbox-card-node" style="background: #07090d; padding: 16px; border: 1px solid #30363d; border-radius: 6px; display: flex; flex-direction: column; gap: 12px;">
    <!-- Окно предпросмотра (Preview Viewport) -->
    <div style="background-color: #020617; border: 1px solid #30363d; border-radius: 6px; aspect-ratio: 16/9; overflow: hidden; position: relative; width: 100%; box-sizing: border-box;">
        <video id="lobby-preview-video" autoplay muted playsinline style="transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; background: #000;"></video>
        <span style="position: absolute; bottom: 8px; left: 8px; background-color: rgba(0,0,0,0.65); font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #8b949e; font-family: monospace; z-index: 10; border: 1px solid #30363d;">PREVIEW CONTOUR</span>
    </div>

    <!-- Панель тогглов устройств -->
    <div style="display: flex; gap: 12px; justify-content: center; width: 100%; box-sizing: border-box;">
        <button id="lobby-audio-toggle" style="flex: 1; background-color: #161b22; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: monospace; font-weight: bold; transition: all 0.2s;">
            🎤 Микрофон: вкл
        </button>
        <button id="lobby-video-toggle" style="flex: 1; background-color: #161b22; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: monospace; font-weight: bold; transition: all 0.2s;">
            📷 Камера: вкл
        </button>
    </div>

    <!-- Главная кнопка входа в Mesh -->
    <button id="lobby-enter-btn" style="width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: monospace; font-size: 13px; margin-top: 4px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);">
        Войти в конференцию
    </button>
</div>
{{end}}
