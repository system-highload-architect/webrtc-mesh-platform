syntax = "proto3";

package pb;

option go_package = "webrtc-mesh-platform/pb/gen;gen";

// StorageMediaBridge отвечает за прямую укладку байт на NVMe диски
service StorageMediaBridge {
    // Потоковый gRPC-метод передачи бинарных WebM-кадров от шлюза в spr-storage
    rpc StreamMediaChunk(stream MediaChunkRequest) returns (MediaStreamResponse);
}

message MediaChunkRequest {
    string record_id = 1; 
    bytes data = 2;       
}

message MediaStreamResponse {
    string status = 1;    
}
