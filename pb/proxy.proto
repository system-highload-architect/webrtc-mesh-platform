syntax = "proto3";

package pb;

option go_package = "webrtc-mesh-platform/pb/gen;gen";

// ProxyTopologyEngine декларирует правила сквозного проксирования L7 уровня
service ProxyTopologyEngine {
    rpc PingProxyGateway(ProxyPing) returns (ProxyPong);
}

message ProxyPing {
    string gateway_id = 1;
}

message ProxyPong {
    bool is_alive = 1;
}
