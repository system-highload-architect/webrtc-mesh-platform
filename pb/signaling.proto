syntax = "proto3";

package pb;

option go_package = "webrtc-mesh-platform/pb/gen;gen";

// MediaSignalingBridge управляет Control Plane плоскостью WebRTC Mesh комнат
service MediaSignalingBridge {
    // Инициализировать комнату конференции модератором
    rpc CreateConferenceRoom(RoomConfigRequest) returns (RoomConfigResponse);
    
    // Продлить время жизни сессии или увеличить лимит участников
    rpc UpdateRoomLimits(UpdateLimitsRequest) returns (UpdateLimitsResponse);
    
    // Принудительный спуск управляющих директив модерации (Mute, Ban, Pause)
    rpc BroadcastControlFrame(ControlFramePayload) returns (ControlFrameAck);
}

// --- ЗАПРОСЫ/ОТВЕТЫ ДЛЯ УПРАВЛЕНИЯ КОМНАТАМИ ---

message RoomConfigRequest {
    string room_id = 1;
    string jwt_token = 2;               // JWT модератора
    int32 max_subscribers = 3;          // до 100
    int64 duration_seconds = 4;         // длительность сессии
    repeated string invite_emails = 5;  // для рассылки инвайтов
}

message RoomConfigResponse {
    bool is_provisioned = 1;
    string hmac_access_token = 2;       // HMAC-токен для инвайта
    uint32 status_code = 3;             // 2001 = успех
}

message UpdateLimitsRequest {
    string room_id = 1;
    string jwt_token = 2;
    int64 extend_duration_seconds = 3;  // продление (макс. 5 часов всего)
    int32 increment_max_peers = 4;      // увеличение лимита участников
}

message UpdateLimitsResponse {
    bool is_updated = 1;
    int64 current_remaining_seconds = 2; // оставшееся время сессии
}

message ControlFramePayload {
    string room_id = 1;
    string jwt_token = 2;               // права модератора
    string target_peer_id = 3;          // цель команды
    string command_type = 4;            // MUTE_AUDIO, STOP_VIDEO, SET_PAUSE, UNPAUSE, KICK_PEER
    int64 pause_duration_seconds = 5;   // для SET_PAUSE
}

message ControlFrameAck {
    bool is_dispatched = 1;
}