syntax = "proto3";

package pb;

option go_package = "webrtc-mesh-platform/pb/gen;gen";

import "google/protobuf/timestamp.proto";

// ChatHistoryBridge полностью изолирует асинхронный аналитический слой чата
service ChatHistoryBridge {
    // Принять входящее сообщение чата, очистить от XSS и отправить в пакетную очередь
    rpc IngestChatMessage(ChatMessagePayload) returns (ChatMessageAck);
    
    // Наносекундное получение Т9 подсказки из префиксного Trie-дерева за O(K)
    rpc QueryT9Autocomplete(T9QueryRequest) returns (T9QueryResponse);

    // НОВЫЙ ФУНКЦИОНАЛ ТЗ: Метод выгрузки архива сообщений по запросу шлюза
    rpc GetRoomChatHistory(GetHistoryRequest) returns (GetHistoryResponse);
}

message ChatMessagePayload {
    string room_id = 1;
    string sender_id = 2;
    string message_text = 3; 
}

message ChatMessageAck {
    string message_id = 1;
    string sanitized_text = 2; 
    bool contains_url = 3;     
    google.protobuf.Timestamp timestamp = 4;
}

message T9QueryRequest {
    string prefix = 1; 
}

message T9QueryResponse {
    string suggestion = 1; 
    bool is_found = 2;
}

message GetHistoryRequest {
    string room_id = 1;
}

message ChatLogFrame {
    string sender_id = 1;
    string text = 2;
}

message GetHistoryResponse {
    repeated ChatLogFrame logs = 1;
}
